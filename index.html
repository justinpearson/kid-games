<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kid Games</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  h1 {
    color: #fff;
    font-size: 3rem;
    margin-bottom: 0.5rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 1.2rem;
    margin-bottom: 2.5rem;
  }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    max-width: 800px;
    width: 100%;
  }
  .game-card {
    background: #fff;
    border-radius: 1rem;
    padding: 2rem;
    text-decoration: none;
    color: #333;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .game-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .game-card .icon {
    font-size: 3rem;
    margin-bottom: 0.75rem;
    display: block;
  }
  .game-card h2 {
    font-size: 1.4rem;
    margin-bottom: 0.5rem;
  }
  .game-card p {
    color: #666;
    font-size: 0.95rem;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <h1>Kid Games</h1>
  <p class="subtitle">Learn while you play!</p>
  <div class="games-grid">
    <a href="tic-tac-toe.html" class="game-card">
      <span class="icon">&#10060;&#11093;</span>
      <h2>Tic-Tac-Toe</h2>
      <p>Play against a friend or challenge the computer in this classic game!</p>
    </a>
    <a href="clock.html" class="game-card">
      <span class="icon">&#128336;</span>
      <h2>Learn the Clock</h2>
      <p>Discover how an analog clock works &mdash; hours, minutes, seconds, and AM/PM!</p>
    </a>
  </div>
  <p style="margin-top:2rem;color:rgba(255,255,255,0.7);font-size:0.85rem;"><a href="https://github.com/justinpearson/kid-games" style="color:rgba(255,255,255,0.9);">View source on GitHub</a></p>
</body>
</html>
