<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe - Kid Games</title>
<link rel="apple-touch-icon" href="apple-touch-icon-tic-tac-toe.png" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem;
  }
  .back-link {
    align-self: flex-start;
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    margin-bottom: 1rem;
    opacity: 0.9;
  }
  .back-link:hover { opacity: 1; text-decoration: underline; }
  h1 { color: #fff; font-size: 2.2rem; margin-bottom: 1rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
  .controls {
    display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center;
  }
  button {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 0.5rem;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.1s;
  }
  .mode-btn:hover, .reset-btn:hover, .size-select:hover { transform: scale(1.05); }
  .mode-btn { background: #fff; color: #333; }
  .mode-btn.active { background: #ffd700; color: #333; }
  .reset-btn { background: rgba(255,255,255,0.3); color: #fff; }
  .size-select {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 0.5rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    background: #fff;
    color: #333;
    font-family: inherit;
    transition: transform 0.1s;
  }
  .win-hint {
    color: rgba(255,255,255,0.85);
    font-size: 1rem;
    margin-bottom: 0.75rem;
    font-weight: 600;
  }
  .status {
    color: #fff;
    font-size: 1.3rem;
    margin-bottom: 1rem;
    min-height: 2rem;
    font-weight: 600;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
  }
  .board {
    --n: 3;
    display: grid;
    grid-template-columns: repeat(var(--n), 1fr);
    grid-template-rows: repeat(var(--n), 1fr);
    gap: calc(24px / var(--n));
    width: min(88vw, calc(240px + var(--n) * 40px));
    aspect-ratio: 1;
  }
  .cell {
    background: rgba(255,255,255,0.9);
    border: none;
    padding: 0;
    min-width: 0;
    min-height: 0;
    border-radius: calc(2.25rem / var(--n));
    font-size: calc(min(88vw, 240px + var(--n) * 40px) / var(--n) * 0.5);
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    line-height: 1;
  }
  .cell:hover:not(.taken) { background: #fff; }
  .cell.taken { cursor: default; }
  .cell.win { background: #ffd700; }
  .cell .x { color: #f5576c; }
  .cell .o { color: #667eea; }
  .score-board {
    margin-top: 1.5rem;
    display: flex;
    gap: 2rem;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 600;
  }
</style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Back to Games</a>
  <h1>Tic-Tac-Toe</h1>
  <div class="controls">
    <button class="mode-btn active" onclick="setMode('2p')">2 Players</button>
    <button class="mode-btn" onclick="setMode('cpu')">vs Computer</button>
    <select class="size-select" id="size-select" onchange="setSize(this.value)" aria-label="Grid size">
      <option value="3" selected>3 &times; 3</option>
      <option value="4">4 &times; 4</option>
      <option value="5">5 &times; 5</option>
      <option value="6">6 &times; 6</option>
      <option value="7">7 &times; 7</option>
      <option value="8">8 &times; 8</option>
      <option value="9">9 &times; 9</option>
      <option value="10">10 &times; 10</option>
    </select>
    <button class="reset-btn" onclick="resetGame()">New Game</button>
  </div>
  <div class="status" id="status">X's turn</div>
  <div class="win-hint" id="win-hint">Get 3 in a row to win!</div>
  <div class="board" id="board"></div>
  <div class="score-board">
    <span id="score-x">X: 0</span>
    <span id="score-draw">Draws: 0</span>
    <span id="score-o">O: 0</span>
  </div>

<script>
let SIZE = 3, WIN_LEN = 3, WINNING = [];
let board, turn, gameOver, mode, scores;

// All runs of WIN_LEN cells: horizontal, vertical, and both diagonal directions.
function buildWinning(n, k) {
  const combos = [];
  const idx = (r, c) => r * n + c;
  const run = (r, c, dr, dc) => Array.from({ length: k }, (_, j) => idx(r + j * dr, c + j * dc));
  for (let r = 0; r < n; r++)
    for (let c = 0; c + k <= n; c++) combos.push(run(r, c, 0, 1));
  for (let c = 0; c < n; c++)
    for (let r = 0; r + k <= n; r++) combos.push(run(r, c, 1, 0));
  for (let r = 0; r + k <= n; r++) {
    for (let c = 0; c + k <= n; c++) combos.push(run(r, c, 1, 1));
    for (let c = k - 1; c < n; c++) combos.push(run(r, c, 1, -1));
  }
  return combos;
}

function init() {
  scores = { X: 0, O: 0, D: 0 };
  mode = '2p';
  setSize(3);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && m === '2p') || (i === 1 && m === 'cpu'));
  });
  resetGame();
}

function setSize(n) {
  SIZE = parseInt(n, 10);
  WIN_LEN = Math.min(SIZE, 5);
  WINNING = buildWinning(SIZE, WIN_LEN);
  document.getElementById('win-hint').textContent = `Get ${WIN_LEN} in a row to win!`;
  resetGame();
}

function resetGame() {
  board = Array(SIZE * SIZE).fill(null);
  turn = 'X';
  gameOver = false;
  render();
  updateStatus();
}

function render() {
  const el = document.getElementById('board');
  el.style.setProperty('--n', SIZE);
  el.innerHTML = '';
  board.forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'cell' + (v ? ' taken' : '');
    if (v) btn.innerHTML = `<span class="${v.toLowerCase()}">${v}</span>`;
    btn.onclick = () => makeMove(i);
    el.appendChild(btn);
  });
}

function makeMove(i) {
  if (gameOver || board[i]) return;
  board[i] = turn;
  const win = checkWin(turn);
  if (win) {
    gameOver = true;
    scores[turn]++;
    updateScores();
    render();
    highlightWin(win);
    document.getElementById('status').textContent = `${turn} wins!`;
    return;
  }
  if (board.every(c => c)) {
    gameOver = true;
    scores.D++;
    updateScores();
    render();
    document.getElementById('status').textContent = "It's a draw!";
    return;
  }
  turn = turn === 'X' ? 'O' : 'X';
  render();
  updateStatus();
  if (mode === 'cpu' && turn === 'O' && !gameOver) {
    setTimeout(cpuMove, 350);
  }
}

function cpuMove() {
  if (gameOver) return;
  const empty = board.map((v, i) => v === null ? i : -1).filter(i => i !== -1);
  let move = -1;
  // Always take a win if available
  move = findBestMove('O');
  // 50% chance to play smart, otherwise pick randomly
  if (move === -1 && Math.random() < 0.5) {
    move = empty[Math.floor(Math.random() * empty.length)];
  }
  if (move === -1) move = findBestMove('X');
  if (move === -1) move = bestLineMove('O');
  const center = Math.floor((SIZE * SIZE) / 2);
  if (move === -1 && SIZE % 2 === 1 && !board[center]) move = center;
  const corners = [0, SIZE - 1, SIZE * (SIZE - 1), SIZE * SIZE - 1];
  if (move === -1) move = corners.find(i => !board[i]) ?? -1;
  if (move === -1) move = board.findIndex(c => !c);
  if (move !== -1) makeMove(move);
}

// A move that completes a winning line for `player`, if one exists.
function findBestMove(player) {
  for (const combo of WINNING) {
    const vals = combo.map(i => board[i]);
    if (vals.filter(v => v === player).length === WIN_LEN - 1 && vals.includes(null)) {
      return combo[vals.indexOf(null)];
    }
  }
  return -1;
}

// Extend the player's longest line that isn't blocked by the opponent.
function bestLineMove(player) {
  let best = -1, bestCount = 0;
  for (const combo of WINNING) {
    const vals = combo.map(i => board[i]);
    if (vals.some(v => v && v !== player)) continue;
    const count = vals.filter(v => v === player).length;
    if (count > bestCount) {
      bestCount = count;
      best = combo[vals.indexOf(null)];
    }
  }
  return best;
}

function checkWin(player) {
  for (const combo of WINNING) {
    if (combo.every(i => board[i] === player)) return combo;
  }
  return null;
}

function highlightWin(combo) {
  const cells = document.querySelectorAll('.cell');
  combo.forEach(i => cells[i].classList.add('win'));
}

function updateStatus() {
  const label = (mode === 'cpu' && turn === 'O') ? "Computer's turn..." : `${turn}'s turn`;
  document.getElementById('status').textContent = label;
}

function updateScores() {
  document.getElementById('score-x').textContent = `X: ${scores.X}`;
  document.getElementById('score-o').textContent = `O: ${scores.O}`;
  document.getElementById('score-draw').textContent = `Draws: ${scores.D}`;
}

init();
</script>
<p style="margin-top:1.5rem;color:rgba(255,255,255,0.7);font-size:0.85rem;"><a href="https://github.com/justinpearson/kid-games" style="color:rgba(255,255,255,0.9);">View source on GitHub</a></p>
</body>
</html>
