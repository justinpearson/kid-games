<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talking Number Grid - Kid Games</title>
<link rel="apple-touch-icon" href="apple-touch-icon-talking-number-grid.png" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .back-link {
    align-self: flex-start;
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    margin-bottom: 0.5rem;
    opacity: 0.9;
  }
  .back-link:hover { opacity: 1; text-decoration: underline; }

  .container {
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    width: 80vw;
    max-width: 1400px;
    resize: horizontal;
    overflow: hidden;
  }

  h1 {
    text-align: center;
    color: #333;
    margin-bottom: 30px;
    font-size: 2rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
    gap: 8px;
    margin: 0 auto;
  }

  .number-button {
    aspect-ratio: 1;
    border: none;
    border-radius: 12px;
    font-size: 1.2rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    position: relative;
    overflow: hidden;
  }

  .number-button:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
  }

  .number-button:active {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
  }

  .number-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.2);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .number-button:hover::before {
    opacity: 1;
  }

  /* Class-based color variations (assigned by Math.abs(number) % 10) */
  .color-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .color-2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
  .color-3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
  .color-4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
  .color-5 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
  .color-6 { background: linear-gradient(135deg, #30cfd0 0%, #5b86e5 100%); }
  .color-7 { background: linear-gradient(135deg, #e040fb 0%, #aa00ff 100%); }
  .color-8 { background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%); }
  .color-9 { background: linear-gradient(135deg, #ffc371 0%, #ff5f6d 100%); }
  .color-0 { background: linear-gradient(135deg, #2af598 0%, #009efd 100%); }

  /* Plus buttons for extending the grid — styled like number buttons */
  .extend-btn {
    aspect-ratio: 1;
    border: none;
    border-radius: 12px;
    font-size: 1.4rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    background: linear-gradient(135deg, #bbb 0%, #999 100%);
    position: relative;
    overflow: hidden;
  }

  .extend-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
  }

  .extend-btn:active {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
  }

  /* Sparkles that shoot out when a number is clicked */
  .sparkle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1000;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 8px currentColor;
    animation: sparkle-fly 0.8s ease-out forwards;
  }

  @keyframes sparkle-fly {
    0% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(
        calc(-50% + var(--dx)),
        calc(-50% + var(--dy))
      ) scale(0.2);
    }
  }

  /* Confetti that rains down for the big celebration (number 100) */
  .confetti {
    position: fixed;
    top: -20px;
    width: 10px;
    height: 16px;
    pointer-events: none;
    z-index: 999;
    border-radius: 2px;
    animation: confetti-fall 3s linear forwards;
  }

  @keyframes confetti-fall {
    0% {
      opacity: 1;
      transform: translateY(0) translateX(0) rotate(0deg);
    }
    100% {
      opacity: 0.8;
      transform: translateY(105vh) translateX(var(--drift)) rotate(var(--spin));
    }
  }

  /* Responsive design */
  @media (max-width: 768px) {
    h1 {
      font-size: 1.5rem;
    }

    .number-button {
      font-size: 1rem;
    }

    .grid {
      gap: 6px;
    }
  }

  @media (max-width: 480px) {
    .container {
      padding: 20px;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }

    .number-button {
      font-size: 0.9rem;
    }

    .grid {
      gap: 4px;
    }
  }
</style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Back to Games</a>
  <div class="container">
    <h1>Click a Number to Hear It!</h1>
    <div class="grid" id="numberGrid"></div>
  </div>
  <p style="margin-top:1rem;color:rgba(255,255,255,0.7);font-size:0.85rem;"><a href="https://github.com/justinpearson/kid-games" style="color:rgba(255,255,255,0.9);">View source on GitHub</a></p>
<script>
// The grid starts showing 0–10. Each click of the + button on either end
// extends the range to the next boundary, following the pattern:
// 10, 20, 100, 200, 1000, 2000, 10000, 20000, 100000, ...
// (alternating ×2 and ×5, forever).
var low = 0;
var high = 10;

// Given the current boundary (always positive), return the next one.
function nextBoundary(current) {
    // The sequence starting from 10: 10, 20, 100, 200, 1000, 2000, ...
    // If current has the form 1×10^k (like 10, 100, 1000), next is 2×10^k.
    // If current has the form 2×10^k (like 20, 200, 2000), next is 1×10^(k+1).
    var digits = current.toString();
    if (digits[0] === '1') {
        return current * 2;
    }
    return current * 5;
}

function renderGrid() {
    var grid = document.getElementById('numberGrid');
    grid.innerHTML = '';

    // Left + button (to extend into negatives)
    var leftBtn = document.createElement('button');
    leftBtn.className = 'extend-btn';
    leftBtn.textContent = '+';
    leftBtn.setAttribute('aria-label', 'Extend into more negative numbers');
    leftBtn.addEventListener('click', extendNegative);
    grid.appendChild(leftBtn);

    // All number buttons from low to high
    for (var n = low; n <= high; n++) {
        grid.appendChild(createNumberButton(n));
    }

    // Right + button (to extend into larger positives)
    var rightBtn = document.createElement('button');
    rightBtn.className = 'extend-btn';
    rightBtn.textContent = '+';
    rightBtn.setAttribute('aria-label', 'Add more numbers');
    rightBtn.addEventListener('click', extendPositive);
    grid.appendChild(rightBtn);
}

function createNumberButton(n) {
    var button = document.createElement('button');
    button.className = 'number-button color-' + (Math.abs(n) % 10);
    button.textContent = n;
    button.setAttribute('aria-label', 'Number ' + n);
    button.addEventListener('click', function (event) {
        speakNumber(n);
        celebrate(n, event.currentTarget);
    });
    return button;
}

function extendNegative() {
    // First click goes to -10, then follows the same ×2/×5 pattern.
    var currentMag = Math.abs(low) || 10;
    low = -(low === 0 ? 10 : nextBoundary(currentMag));
    renderGrid();
}

function extendPositive() {
    high = nextBoundary(high);
    renderGrid();
}

function speakNumber(number) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(number.toString());
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        utterance.volume = 1.0;
        window.speechSynthesis.speak(utterance);
    } else {
        alert('Number ' + number);
        console.warn('Speech synthesis not supported in this browser');
    }
}

// ----- Sparkles, confetti & celebration -----------------------------------

var SPARKLE_COLORS = [
    '#ffd700', '#ff6b6b', '#4facfe', '#43e97b', '#f093fb',
    '#fee140', '#00f2fe', '#aa00ff', '#ff9a56', '#2af598'
];

// Decide how big a celebration a number deserves, then fire it off from the
// center of the clicked button.
function celebrate(number, button) {
    var rect = button.getBoundingClientRect();
    var x = rect.left + rect.width / 2;
    var y = rect.top + rect.height / 2;

    if (Math.abs(number) === 100) {
        // The big one: tons of sparkles, confetti and a little fanfare.
        shootSparkles(x, y, 80);
        shootConfetti(150);
        playFanfare();
    } else if (number !== 0 && number % 10 === 0) {
        // Multiples of 10 get extra sparkles.
        shootSparkles(x, y, 40);
    } else {
        // Every other number gets a modest burst.
        shootSparkles(x, y, 14);
    }
}

// Spawn `count` sparkle particles that fly outward from (x, y).
function shootSparkles(x, y, count) {
    for (var i = 0; i < count; i++) {
        var sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = x + 'px';
        sparkle.style.top = y + 'px';
        sparkle.style.background = SPARKLE_COLORS[i % SPARKLE_COLORS.length];

        // Random direction and distance for the burst.
        var angle = Math.random() * Math.PI * 2;
        var distance = 40 + Math.random() * 80;
        var dx = Math.cos(angle) * distance;
        var dy = Math.sin(angle) * distance;
        sparkle.style.setProperty('--dx', dx + 'px');
        sparkle.style.setProperty('--dy', dy + 'px');

        var size = 6 + Math.random() * 8;
        sparkle.style.width = size + 'px';
        sparkle.style.height = size + 'px';

        document.body.appendChild(sparkle);
        removeAfterAnimation(sparkle);
    }
}

// Rain `count` confetti pieces down from the top of the screen.
function shootConfetti(count) {
    for (var i = 0; i < count; i++) {
        var piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = SPARKLE_COLORS[i % SPARKLE_COLORS.length];
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        piece.style.animationDuration = 2 + Math.random() * 1.5 + 's';
        piece.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
        piece.style.setProperty('--spin', (Math.random() * 720 - 360) + 'deg');

        document.body.appendChild(piece);
        removeAfterAnimation(piece);
    }
}

// Remove an element once its CSS animation finishes (with a fallback timer).
function removeAfterAnimation(el) {
    var done = false;
    function cleanup() {
        if (done) return;
        done = true;
        if (el.parentNode) {
            el.parentNode.removeChild(el);
        }
    }
    el.addEventListener('animationend', cleanup);
    setTimeout(cleanup, 4000);
}

// Play a short celebratory fanfare using the Web Audio API so we don't need
// any audio files.
function playFanfare() {
    if (!('AudioContext' in window || 'webkitAudioContext' in window)) {
        return;
    }
    try {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        var ctx = new AudioCtx();

        // A cheerful ascending arpeggio ending on a high note.
        var notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
        var noteLength = 0.16;

        notes.forEach(function (freq, i) {
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;

            var start = ctx.currentTime + i * noteLength;
            var end = start + noteLength + 0.1;
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.exponentialRampToValueAtTime(0.3, start + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0001, end);

            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(start);
            osc.stop(end);
        });

        // Close the context after the fanfare finishes to free resources.
        setTimeout(function () {
            ctx.close();
        }, (notes.length * noteLength + 0.5) * 1000);
    } catch (e) {
        console.warn('Could not play fanfare', e);
    }
}

document.addEventListener('DOMContentLoaded', function () {
    renderGrid();
});
</script>
</body>
</html>
